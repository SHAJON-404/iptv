name: Build Desktop & Mobile Application

on:
  workflow_dispatch:

jobs:
  build:
    name: Build & Package
    strategy:
      matrix:
        include:
          - platform: windows
            os: "windows-2022"
          - platform: linux
            os: "ubuntu-22.04"
          - platform: android
            os: "ubuntu-22.04"
    runs-on: ${{ matrix.os }}
    env:
      HAS_SIGNING_SECRETS: ${{ secrets.ANDROID_SIGNING_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js & Package Electron
        if: matrix.platform == 'windows' || matrix.platform == 'linux'
        run: |
          if [ "${{ matrix.platform }}" = "windows" ]; then
            npm run electron:dist-win -- --publish never
            mv dist/"IPTV Player Setup"*.exe dist/windows-iptv-player-setup.exe
            mv dist/"IPTV Player"*-win.zip dist/windows-iptv-player.zip
          else
            npm run electron:dist-linux -- --publish never
            mv dist/*.AppImage dist/linux-iptv-player.AppImage
            mv dist/*.deb dist/linux-iptv-player.deb
            mv dist/*.rpm dist/linux-iptv-player.rpm
          fi
        shell: bash
        env:
          ALLOWED_DEV_ORIGINS: "live.shajon.dev,192.168.0.57,192.168.0.179,127.0.0.1"
          NEXT_PUBLIC_SITE_URL: "https://tv.shajon.dev"
          PLAYLIST_DOMAIN: "iamshajon.com"
          ENABLE_DEVTOOLS: "false"
          GENERATE_SOURCEMAP: "false"
          NODE_ENV: "production"

      - name: Setup Java JDK
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Android Release APK
        if: matrix.platform == 'android'
        run: |
          chmod +x android/gradlew
          npm run android:build-release
        shell: bash
        env:
          ALLOWED_DEV_ORIGINS: "live.shajon.dev,192.168.0.57,192.168.0.179,127.0.0.1"
          NEXT_PUBLIC_SITE_URL: "https://tv.shajon.dev"
          PLAYLIST_DOMAIN: "iamshajon.com"
          NODE_ENV: "production"

      - name: Sign & Prepare Android Release APK
        if: matrix.platform == 'android'
        run: |
          if [ "${{ env.HAS_SIGNING_SECRETS }}" = "true" ]; then
            # 1. Decode the signing key base64
            echo "${{ secrets.ANDROID_SIGNING_KEY }}" | base64 -d > release.keystore
            
            # 2. Find the latest build tools directory dynamically
            BUILD_TOOLS_DIR=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | tail -n 1)
            echo "Using Android Build Tools: $BUILD_TOOLS_DIR"
            
            # 3. Zipalign the unsigned APK
            $BUILD_TOOLS_DIR/zipalign -f -v 4 android/app/build/outputs/apk/release/app-release-unsigned.apk aligned.apk
            
            # 4. Sign the aligned APK
            $BUILD_TOOLS_DIR/apksigner sign --ks release.keystore --ks-key-alias "${{ secrets.ANDROID_ALIAS }}" --ks-pass pass:"${{ secrets.ANDROID_KEY_STORE_PASSWORD }}" --key-pass pass:"${{ secrets.ANDROID_KEY_PASSWORD }}" --out android/app/build/outputs/apk/release/android-iptv-player.apk aligned.apk
            
            # 5. Clean up temporary files
            rm -f release.keystore aligned.apk
            echo "Android release APK signed successfully: android-iptv-player.apk"
          else
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk android/app/build/outputs/apk/release/android-iptv-player.apk
            echo "No signing secrets found. Fallback copied unsigned APK to: android-iptv-player.apk"
          fi
        shell: bash

      - name: Upload Windows Artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: IPTV-Player-windows
          path: |
            dist/windows-iptv-player-setup.exe
            dist/windows-iptv-player.zip
          if-no-files-found: error

      - name: Upload Linux Artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: IPTV-Player-linux
          path: |
            dist/linux-iptv-player.AppImage
            dist/linux-iptv-player.deb
            dist/linux-iptv-player.rpm
          if-no-files-found: error

      - name: Upload Android Artifacts
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: IPTV-Player-android
          path: android/app/build/outputs/apk/release/android-iptv-player.apk
          if-no-files-found: error

  publish:
    name: Publish a release
    runs-on: "ubuntu-22.04"
    needs: build
    if: github.event_name == 'workflow_dispatch' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Get all distributables
        uses: actions/download-artifact@v4

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: false
          generate_release_notes: true
          files: |
            **/android-iptv-player.apk
            **/linux-iptv-player.AppImage
            **/linux-iptv-player.deb
            **/linux-iptv-player.rpm
            **/windows-iptv-player-setup.exe
            **/windows-iptv-player.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
