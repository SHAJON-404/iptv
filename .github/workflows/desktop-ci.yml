name: Build Desktop & Mobile Application

on:
  workflow_dispatch:

jobs:
  build:
    name: Build & Package
    strategy:
      matrix:
        include:
          - platform: windows
            os: "windows-2022"
          - platform: linux
            os: "ubuntu-22.04"
          - platform: android
            os: "ubuntu-22.04"
    runs-on: ${{ matrix.os }}
    env:
      HAS_SIGNING_SECRETS: ${{ secrets.ANDROID_SIGNING_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js & Package Electron
        if: matrix.platform == 'windows' || matrix.platform == 'linux'
        run: |
          if [ "${{ matrix.platform }}" = "windows" ]; then
            npm run electron:dist-win -- --publish never
          else
            npm run electron:dist-linux -- --publish never
          fi
        shell: bash
        env:
          ALLOWED_DEV_ORIGINS: "live.shajon.dev,192.168.0.57,192.168.0.179,127.0.0.1"
          NEXT_PUBLIC_SITE_URL: "https://tv.shajon.dev"
          PLAYLIST_DOMAIN: "iamshajon.com"
          ENABLE_DEVTOOLS: "false"
          GENERATE_SOURCEMAP: "false"
          NODE_ENV: "production"

      - name: Setup Java JDK
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android Release APK
        if: matrix.platform == 'android'
        run: |
          chmod +x android/gradlew
          npm run android:build-release
        shell: bash
        env:
          ALLOWED_DEV_ORIGINS: "live.shajon.dev,192.168.0.57,192.168.0.179,127.0.0.1"
          NEXT_PUBLIC_SITE_URL: "https://tv.shajon.dev"
          PLAYLIST_DOMAIN: "iamshajon.com"
          NODE_ENV: "production"

      - name: Sign Android Release APK
        if: matrix.platform == 'android' && env.HAS_SIGNING_SECRETS == 'true'
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Windows Artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: IPTV-Player-windows
          path: |
            dist/*.exe
            dist/*.zip
          if-no-files-found: error

      - name: Upload Linux Artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: IPTV-Player-linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
          if-no-files-found: error

      - name: Upload Android Artifacts
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: IPTV-Player-android
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  publish:
    name: Publish a release
    runs-on: "ubuntu-22.04"
    needs: build
    if: github.event_name == 'workflow_dispatch' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Get all distributables
        uses: actions/download-artifact@v4

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: false
          generate_release_notes: true
          files: |
            **/*.exe
            **/*.zip
            **/*.AppImage
            **/*.deb
            **/*.rpm
            **/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
